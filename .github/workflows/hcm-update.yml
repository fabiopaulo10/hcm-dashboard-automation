name: HCM Dashboard Daily Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery google-auth requests

      - name: Create Google credentials file
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_ADC_CREDENTIALS }}
        run: python3 -c "import os; open('/tmp/gcloud_adc.json','w').write(os.environ['GOOGLE_CREDS'])"

      - name: Run update script
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud_adc.json
          GRID_API_TOKEN: ${{ secrets.GRID_API_TOKEN }}
        run: python update_dashboard.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp artifact_hcm.html docs/index.html
          git add docs/index.html
          git commit -m "Update HCM dashboard $(date +'%Y-%m-%d')" || echo "No changes"
          git push

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcloud_adc.json
