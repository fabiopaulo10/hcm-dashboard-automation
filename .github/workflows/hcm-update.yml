name: HCM Dashboard Daily Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery google-auth requests

      - name: Create Google credentials file
        run: echo '${{ secrets.GOOGLE_ADC_CREDENTIALS }}' > /tmp/gcloud_adc.json

      - name: Run update script
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud_adc.json
          GRID_API_TOKEN: ${{ secrets.GRID_API_TOKEN }}
        run: python update_dashboard.py

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcloud_adc.json
